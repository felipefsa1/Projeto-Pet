<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Petshop - Vila Pet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">


    

  <header>

      <nav class="navbar navbar-expand-lg navbar-light custom-navbar fixed-top">
            <div class="container">

                <a class="navbar-brand logo" href="#">
                    Vila Pet
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">

                    <span class="navbar-toggler-icon"></span>

                </button>

                <div class="collapse navbar-collapse" id="menu">

                    <ul class="navbar-nav mx-auto">

                        <li class="nav-item">
                            <a class="nav-link" href="#">Início</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#">Serviços</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#">Profissionais</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#">Loja</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#">Contato</a>
                        </li>

                    </ul>

                    <div class="d-flex gap-2">

                     

                        <a href="#" class="btn btn-primary">
                            Agendar
                        </a>

                    </div>

                </div>

            </div>

        </nav>

    </header>
    

    

<div class="container py-5" style="max-width: 700px;">
    <h2 class="mb-4 text-center">Cadastre sua Petshop ou Clínica</h2>
    <p class="text-center text-muted mb-5">Faça parte da maior rede de cuidados pet do Brasil</p>

    <form id="cadastroForm" class="row g-4">
        <div class="col-md-6">
            <label class="form-label">Nome da Empresa *</label>
            <input type="text" class="form-control" id="nome" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">CNPJ *</label>
            <input type="text" class="form-control" id="cnpj" placeholder="00.000.000/0000-00">
        </div>

        <div class="col-12">
            <label class="form-label">Endereço completo *</label>
            <input type="text" class="form-control" id="endereco" required>
        </div>

        <div class="col-md-4">
            <label class="form-label">Cidade *</label>
            <input type="text" class="form-control" id="cidade" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Bairro</label>
            <input type="text" class="form-control" id="bairro">
        </div>
        <div class="col-md-4">
            <label class="form-label">CEP</label>
            <input type="text" class="form-control" id="cep">
        </div>

        <div class="col-12">
            <label class="form-label">Telefone/WhatsApp *</label>
            <input type="tel" class="form-control" id="telefone" required>
        </div>

        <div class="col-12">
            <label class="form-label">Descrição da empresa (máx 300 caracteres)</label>
            <textarea class="form-control" id="descricao" rows="4" maxlength="300"></textarea>
        </div>

        <div class="col-12">
            <label class="form-label">Serviços oferecidos (selecione)</label>
            <div class="row">
                <div class="col-md-4"><input type="checkbox" id="banho"> Banho & Tosa</div>
                <div class="col-md-4"><input type="checkbox" id="consulta"> Consulta Veterinária</div>
                <div class="col-md-4"><input type="checkbox" id="vacinacao"> Vacinação</div>
                <!-- adicione mais -->
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100">Cadastrar Petshop</button>
    </form>
</div>

<script>
// Validação simples + simulação de envio
document.getElementById('cadastroForm').addEventListener('submit', function(e) {
    e.preventDefault();
    alert("✅ Cadastro recebido! Em breve entraremos em contato para ativar seu perfil.");
    // Aqui depois você vai mandar pro backend
});
</script>
</body>
</html>
